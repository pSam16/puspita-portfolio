<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/4.0.0/uicons-regular-rounded/css/uicons-regular-rounded.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <title>Project Detail</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #212529;
            font-family: "Montserrat", sans-serif;
            color: #fff;
        }

        a { color: #fff; text-decoration: none; }
        ul { list-style: none; padding-left: 0; }

        /* ── Navbar ── */
        .header {
            background-color: #212529;
            position: sticky;
            top: 0;
            z-index: 1000;
            transition: background 0.3s ease, backdrop-filter 0.3s ease, box-shadow 0.3s ease;
        }
        .header.scrolled {
            background: rgba(33, 37, 41, 0.6) !important;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 4px 24px rgba(0,0,0,0.35);
        }
        .navbar { font-weight: 600; padding: 15px 0; }
        .nav-link { color: #fff !important; padding: 15px !important; }
        .nav-link:hover { color: #03CAD6 !important; }
        .navbar-light .navbar-nav .nav-link.active { color: #03CAD6 !important; }
        .dropdown-menu {
            background-color: #2c3035;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .dropdown-item { color: #fff; }
        .dropdown-item:hover { background-color: rgba(3,202,214,0.12); color: #03CAD6; }
        .navbar-toggler { border: none; background-color: #03CAD6; color: #fff; }

        /* ── Page container ── */
        .detail-page {
            width: 100%;
        }

        /* ── Text container (constrained) ── */
        .detail-text {
            max-width: 860px;
            margin: 0 auto;
            padding: 60px 24px 56px;
        }

        /* ── Description block ── */
        .detail-meta {
            font-size: 0.7rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.35);
            margin-bottom: 16px;
        }

        .detail-title {
            font-size: clamp(2rem, 5vw, 3.2rem);
            font-weight: 700;
            line-height: 1.15;
            margin-bottom: 24px;
            color: #fff;
        }

        .detail-desc {
            font-size: 1rem;
            line-height: 1.9;
            color: rgba(255,255,255,0.55);
            margin-bottom: 48px;
        }

        /* ── Details row ── */
        .detail-row {
            display: flex;
            gap: 48px;
            flex-wrap: wrap;
            padding: 28px 0;
            border-top: 1px solid rgba(255,255,255,0.08);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            margin-bottom: 60px;
            justify-content: space-between;

        }

        .detail-col {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .detail-label {
            font-size: 0.65rem;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.3);
        }

        .detail-value {
            font-size: 0.95rem;
            font-weight: 500;
            color: #fff;
        }

        .tech-stack {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tech-tag {
            background: rgba(3, 202, 214, 0.1);
            color: #03CAD6;
            border: 1px solid rgba(3, 202, 214, 0.3);
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 500;
        }

        /* ── Images (full screen width) ── */
        .detail-images {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .detail-images img {
            width: 100%;
            display: block;
        }

        /* ── Next project sticky scroll zone ── */
        .next-scroll-zone {
            position: relative;
            height: 280vh; /* extra height = scroll room while panel is sticky */
        }

        .next-project-panel {
            position: sticky;
            top: 0;
            height: 100vh;
            background: #f5f0eb;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .next-project-inner {
            text-align: center;
        }

        .next-project-heading {
            font-size: clamp(3rem, 10vw, 7rem);
            font-weight: 700;
            color: #1a1a1a;
            letter-spacing: -2px;
            line-height: 1;
            margin-bottom: 24px;
        }

        .next-project-scroll {
            font-size: 0.85rem;
            color: #999;
            letter-spacing: 1.5px;
            margin-bottom: 20px;
        }

        /* Progress bar line */
        .next-project-line {
            width: 180px;
            height: 1px;
            background: #ddd;
            margin: 0 auto;
            overflow: hidden;
        }

        .next-project-progress {
            height: 100%;
            width: 0%;
            background: #1a1a1a;
            transition: width 0.08s linear;
        }

        /* ── 404 state ── */
        .not-found {
            text-align: center;
            padding: 120px 24px;
            color: rgba(255,255,255,0.4);
        }
        .not-found h2 { font-size: 2rem; margin-bottom: 16px; color: #fff; }

        @media (max-width: 576px) {
            .detail-row { gap: 24px; }
            .detail-title { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <section class="header">
      <nav class="navbar navbar-expand-md navbar-light">
        <div class="container">
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <i class="fi fi-rr-bars-staggered"></i>
          </button>
          <div class="collapse navbar-collapse d-flex justify-content-center" id="navbarSupportedContent">
            <button class="btn-close btn-close-white d-md-none" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Close navigation"></button>
            <ul class="navbar-nav mb-2 mb-lg-0">
              <li class="nav-item">
                <a class="nav-link" href="home.html">HOME</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="about_me/index.html">ABOUT ME</a>
              </li>
              <li class="nav-item">
                <a class="nav-link active" href="all-projects.html">PROJECTS</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="contact/index.html">CONTACT ME</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>  
  
    </section>

    <!-- Page content -->
    <div class="detail-page" id="detailPage">
        <!-- Populated by JS -->
    </div>

    <script src="assets/js/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js" integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q" crossorigin="anonymous"></script>
    <script src="assets/js/project-data.js"></script>
    <script>
        // Sticky glass navbar
        window.addEventListener('scroll', function () {
            document.querySelector('.header').classList.toggle('scrolled', window.scrollY > 60);
        });

        const projectOrder = ['project1','project2','project3','project4','project5','project6','project7','project8'];

        function getNextId(currentId) {
            const idx = projectOrder.indexOf(currentId);
            return (idx !== -1 && idx < projectOrder.length - 1) ? projectOrder[idx + 1] : null;
        }

        function buildProjectHTML(proj) {
            const techTags = proj.technologies.map(t => `<span class="tech-tag">${t}</span>`).join('');
            const images   = proj.images.map(src => `<img src="${src}" alt="${proj.title}">`).join('');
            return `
                <div class="detail-text">
                    <p class="detail-meta">${proj.category} / ${proj.year}</p>
                    <h1 class="detail-title">${proj.title}</h1>
                    <p class="detail-desc">${proj.description}</p>
                    <div class="detail-row">
                        <div class="detail-col">
                            <span class="detail-label">Client</span>
                            <span class="detail-value">${proj.client}</span>
                        </div>
                        <div class="detail-col">
                            <span class="detail-label">Duration</span>
                            <span class="detail-value">${proj.duration}</span>
                        </div>
                        <div class="detail-col">
                            <span class="detail-label">Tools</span>
                            <div class="tech-stack">${techTags}</div>
                        </div>
                    </div>
                </div>
                <div class="detail-images">${images}</div>`;
        }

        function appendNextTeaser(nextId, container) {
            const uid = 'prog_' + nextId;

            // Scroll zone: tall enough to give scroll room while panel sticks
            const zone = document.createElement('div');
            zone.className = 'next-scroll-zone';
            zone.innerHTML = `
                <div class="next-project-panel">
                    <div class="next-project-inner">
                        <h2 class="next-project-heading">Next project</h2>
                        <p class="next-project-scroll">Keep Scrolling</p>
                        <div class="next-project-line">
                            <div class="next-project-progress" id="${uid}"></div>
                        </div>
                    </div>
                </div>`;
            container.appendChild(zone);

            let loaded = false;

            function onScroll() {
                const rect  = zone.getBoundingClientRect();
                const total = zone.offsetHeight - window.innerHeight; // scrollable distance
                const scrolled = -rect.top;
                const pct = Math.min(Math.max(scrolled / total, 0), 1);

                const bar = document.getElementById(uid);
                if (bar) bar.style.width = (pct * 100) + '%';

                if (pct >= 1 && !loaded) {
                    loaded = true;
                    window.removeEventListener('scroll', onScroll);

                    const proj = projectData[nextId];
                    if (!proj) return;

                    window.history.replaceState({}, '', `project-detail.html?id=${nextId}`);
                    document.title = proj.title + ' — Portfolio';

                    const section = document.createElement('div');
                    section.innerHTML = buildProjectHTML(proj);
                    container.appendChild(section);

                    const furtherNext = getNextId(nextId);
                    if (furtherNext) appendNextTeaser(furtherNext, container);
                }
            }

            window.addEventListener('scroll', onScroll, { passive: true });
        }

        // ── Initial render ──
        const params  = new URLSearchParams(window.location.search);
        const id      = params.get('id');
        const project = projectData[id];
        const page    = document.getElementById('detailPage');

        if (!project) {
            page.innerHTML = `
                <div class="not-found">
                    <h2>Project not found</h2>
                    <p><a href="home.html" style="color:#03CAD6;">← Back to home</a></p>
                </div>`;
        } else {
            document.title = project.title + ' — Portfolio';
            page.innerHTML = buildProjectHTML(project);

            const nextId = getNextId(id);
            if (nextId) appendNextTeaser(nextId, page);
        }
    </script>
</body>
</html>
